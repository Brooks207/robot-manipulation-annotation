# SAM3 segmentation smoke on a LOCAL LeRobot v3 dataset (LIBERO (LeRobot v3, franka)).
# Produces an RGB | masks QC image as portfolio evidence.
# Run with the vLLM venv (has torch + transformers>=5.0):
#   /root/.venv_vllm/bin/python3 run_annotate.py configs/lerobot_libero_smoke.yaml --stage segmentation

dataset_path: ./data/libero
dataset_type: lerobot_v3
camera_names:
  - observation.images.image              # LIBERO main camera (512x512, AV1)

stage: segmentation                       # SAM3 only; depth needs camera intrinsics

discovery:
  extractor: qwen                         # use the clean Qwen queries
  instruction_source: episode_field
  instruction_field: tasks
  always_include: [robot hand, gripper]
  qwen_endpoint: http://localhost:8000/v1/chat/completions
  qwen_model: qwen3
  qwen_api_key: null
  qwen_temperature: 0.0
  qwen_max_tokens: 128
  qwen_timeout: 60.0

sampling:
  mode: uniform
  frames_per_episode: 8

segmentation:
  model_path: facebook/sam3   # local SAM3 weights (symlink)
  confidence_threshold: 0.5
  mask_threshold: 0.5

storage:
  output_dir: ./outputs/libero_smoke
  overwrite: false

qc:
  enabled: true
  num_frames_per_episode: 4

episode_indices: [0, 43, 78]
